<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>SXH Admin — Navigation</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Segoe UI',system-ui,sans-serif;background:#f4f6f9;min-height:100vh;}
    .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
    .page-header h1{font-size:24px;font-weight:700;color:#00458f;}
    .page-header p{font-size:13px;color:#8c8c8c;margin-top:4px;}
    .btn{padding:10px 20px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:none;font-family:inherit;display:inline-flex;align-items:center;gap:6px;transition:all .15s;}
    .btn-primary{background:#00458f;color:#fff;}.btn-primary:hover{background:#003a7a;}
    .btn-outline{background:#fff;color:#00458f;border:1px solid #dde3ea;}.btn-outline:hover{border-color:#00458f;}
    .btn-danger{background:#fef2f2;color:#dc2626;border:1px solid #fca5a5;}
    .btn-sm{padding:6px 12px;font-size:12px;}
    .lang-tabs{display:flex;gap:8px;margin-bottom:24px;}
    .lang-tab{padding:8px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid #dde3ea;background:#fff;color:#666;transition:all .15s;}
    .lang-tab.active{background:#00458f;color:#fff;border-color:#00458f;}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
    .card{background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);}
    .card-header{padding:16px 20px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;justify-content:space-between;}
    .card-header h3{font-size:14px;font-weight:700;color:#00458f;}
    .card-body{padding:16px 20px;}
    .nav-link-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;border:1px solid #f0f0f0;margin-bottom:8px;cursor:grab;transition:box-shadow .15s;}
    .nav-link-item:hover{box-shadow:0 2px 8px rgba(0,0,0,.1);}
    .nav-link-item.dragging{opacity:.5;}
    .drag-handle{color:#c0c0c0;cursor:grab;}
    .link-label{flex:1;font-size:13px;font-weight:600;color:#1a1a2e;}
    .link-href{font-size:11px;color:#8c8c8c;}
    .icon-btn{width:28px;height:28px;border-radius:6px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;}
    .icon-btn-edit{background:#dbeafe;color:#1d4ed8;}.icon-btn-edit:hover{background:#bfdbfe;}
    .icon-btn-del{background:#fef2f2;color:#dc2626;}.icon-btn-del:hover{background:#fee2e2;}
    .add-link-form{background:#f8fafc;border-radius:8px;padding:12px;margin-top:12px;border:1px dashed #dde3ea;display:none;}
    .add-link-form h4{font-size:12px;font-weight:700;color:#444;margin-bottom:10px;}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
    input,select,textarea{width:100%;padding:9px 11px;border:1px solid #dde3ea;border-radius:7px;font-size:13px;font-family:inherit;outline:none;color:#1a1a2e;}
    input:focus,select:focus{border-color:#00458f;}
    textarea{resize:vertical;min-height:72px;}
    .footer-col{margin-bottom:16px;padding:16px;border:1px solid #f0f0f0;border-radius:8px;}
    .footer-col-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
    .footer-link-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:6px;border:1px solid #f0f0f0;margin-bottom:6px;font-size:12px;}
    .footer-link-label{flex:1;font-weight:600;color:#1a1a2e;}
    .footer-link-href{color:#8c8c8c;font-size:11px;}
    .full-card{background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-top:20px;}
    .save-status{font-size:12px;color:#16a34a;display:none;}.save-status.show{display:block;}
  </style>
</head>
<body>
<div id="sidebar" class="sidebar"></div>
<main class="main">
  <div class="page-header">
    <div><h1 id="t-title"></h1><p id="t-sub"></p></div>
    <button class="btn btn-primary" onclick="saveAll()" id="t-savebtn"></button>
  </div>
  <div class="lang-tabs" id="content-lang-tabs"></div>
  <div class="grid">
    <div class="card">
      <div class="card-header"><h3 id="t-headerNav"></h3><button class="btn btn-outline btn-sm" onclick="showAddHeader()" id="t-addlink"></button></div>
      <div class="card-body">
        <div id="header-list"></div>
        <div class="add-link-form" id="add-header-form">
          <h4 id="t-newlinklabel"></h4>
          <div class="form-row">
            <input id="nh-label" /><input id="nh-href"/>
          </div>
          <div style="display:flex;gap:8px">
            <button class="btn btn-primary btn-sm" onclick="addHeaderLink()" id="t-addlinkbtn"></button>
            <button class="btn btn-outline btn-sm" onclick="document.getElementById('add-header-form').style.display='none'" id="t-cancelbtn"></button>
          </div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-header"><h3 id="t-tagline"></h3></div>
      <div class="card-body"><textarea id="footer-tagline"></textarea></div>
    </div>
  </div>
  <div class="full-card">
    <div class="card-header"><h3 id="t-footercols"></h3><button class="btn btn-outline btn-sm" onclick="addFooterCol()" id="t-addcol"></button></div>
    <div class="card-body" id="footer-cols"></div>
  </div>
  <div style="margin-top:16px;display:flex;align-items:center;gap:12px">
    <button class="btn btn-primary" onclick="saveAll()" id="t-savebtn2"></button>
    <span class="save-status" id="save-status"></span>
  </div>
</main>

<script src="i18n.js"></script>
<script src="sidebar.js"></script>
<script>
  const role=sessionStorage.getItem('sxh-role');
  if(!role) location.href='index.html';
  let navData={};
  let currentContentLang='de';

  function applyTranslations(){
    renderSidebar('navigation');
    document.getElementById('t-title').textContent=a('navTitle');
    document.getElementById('t-sub').textContent=a('navSub');
    document.getElementById('t-savebtn').innerHTML=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>${role==='admin'?a('savePublish'):a('saveDraftBtn')}`;
    document.getElementById('t-savebtn2').innerHTML=document.getElementById('t-savebtn').innerHTML;
    document.getElementById('t-headerNav').textContent=a('headerNav');
    document.getElementById('t-addlink').textContent=a('addLink');
    document.getElementById('t-newlinklabel').textContent=a('newHeaderLink');
    document.getElementById('nh-label').placeholder=a('labelField');
    document.getElementById('nh-href').placeholder=a('hrefField');
    document.getElementById('t-addlinkbtn').textContent=a('add');
    document.getElementById('t-cancelbtn').textContent=a('cancel');
    document.getElementById('t-tagline').textContent=a('footerTagline');
    document.getElementById('t-footercols').textContent=a('footerCols');
    document.getElementById('t-addcol').textContent=a('addCol');
    // Content language tabs
    document.getElementById('content-lang-tabs').innerHTML=
      ['de','en','tr'].map(l=>`<button class="lang-tab ${l===currentContentLang?'active':''}" onclick="switchContentLang('${l}',this)">
        ${l==='de'?'🇩🇪 Deutsch':l==='en'?'🇬🇧 English':'🇹🇷 Türkçe'}
      </button>`).join('');
  }

  function switchContentLang(lang,btn){
    currentContentLang=lang;
    document.querySelectorAll('.lang-tab').forEach(t=>t.classList.remove('active'));
    btn.classList.add('active');
    navData.footer[currentContentLang].tagline=document.getElementById('footer-tagline').value;
    renderAll();
  }

  async function loadNav(){
    try{
      const r=await fetch('../data/navigation.json?_='+Date.now());
      navData=await r.json();
      renderAll();
    }catch(e){console.error(e);}
  }

  function renderAll(){renderHeaderList();renderFooterTagline();renderFooterCols();}

  function renderHeaderList(){
    const links=navData.header?.[currentContentLang]||[];
    document.getElementById('header-list').innerHTML=links.map((l,i)=>`
      <div class="nav-link-item" draggable="true" data-i="${i}" ondragstart="dragStart(event)" ondragover="dragOver(event)" ondrop="dropH(event,${i})">
        <div class="drag-handle">⠿</div>
        <div style="flex:1"><div class="link-label">${l.label}</div><div class="link-href">${l.href}</div></div>
        <label style="display:flex;align-items:center;gap:4px;font-size:11px;color:#666;cursor:pointer;margin-right:4px">
          <input type="checkbox" ${l.active!==false?'checked':''} onchange="navData.header['${currentContentLang}'][${i}].active=this.checked" style="width:auto;padding:0"/> ${a('active')}
        </label>
        <button class="icon-btn icon-btn-edit" onclick="editHeaderLink(${i})"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
        <button class="icon-btn icon-btn-del" onclick="delHeaderLink(${i})"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg></button>
      </div>`).join('');
  }

  function editHeaderLink(i){const l=navData.header[currentContentLang][i];const label=prompt(a('labelField'),l.label);if(label===null)return;const href=prompt(a('hrefField'),l.href);if(href===null)return;navData.header[currentContentLang][i].label=label;navData.header[currentContentLang][i].href=href;renderHeaderList();}
  function delHeaderLink(i){if(!confirm(a('deleteConfirmNav')))return;navData.header[currentContentLang].splice(i,1);renderHeaderList();}
  function showAddHeader(){document.getElementById('add-header-form').style.display='block';}
  function addHeaderLink(){
    const label=document.getElementById('nh-label').value.trim();const href=document.getElementById('nh-href').value.trim();
    if(!label||!href)return;
    if(!navData.header[currentContentLang])navData.header[currentContentLang]=[];
    navData.header[currentContentLang].push({id:'custom-'+Date.now(),label,href,active:true});
    document.getElementById('nh-label').value='';document.getElementById('nh-href').value='';
    document.getElementById('add-header-form').style.display='none';renderHeaderList();
  }

  let dragIdx=null;
  function dragStart(e){dragIdx=parseInt(e.currentTarget.dataset.i);e.currentTarget.classList.add('dragging');}
  function dragOver(e){e.preventDefault();}
  function dropH(e,toIdx){e.preventDefault();document.querySelectorAll('.nav-link-item').forEach(el=>el.classList.remove('dragging'));if(dragIdx===null||dragIdx===toIdx)return;const arr=navData.header[currentContentLang];const moved=arr.splice(dragIdx,1)[0];arr.splice(toIdx,0,moved);dragIdx=null;renderHeaderList();}

  function renderFooterTagline(){document.getElementById('footer-tagline').value=navData.footer?.[currentContentLang]?.tagline||'';}

  function renderFooterCols(){
    const cols=navData.footer?.[currentContentLang]?.columns||[];
    document.getElementById('footer-cols').innerHTML=cols.map((col,ci)=>`
      <div class="footer-col">
        <div class="footer-col-title">
          <input value="${col.title}" onchange="navData.footer['${currentContentLang}'].columns[${ci}].title=this.value" style="font-size:13px;font-weight:700;color:#00458f;border:none;background:none;outline:none;border-bottom:1px solid #dde3ea;padding:2px 0;width:180px"/>
          <div style="display:flex;gap:6px">
            <button class="btn btn-outline btn-sm" onclick="addFooterLink(${ci})">${a('addLink')}</button>
            <button class="btn btn-danger btn-sm" onclick="delFooterCol(${ci})">${a('delete')}</button>
          </div>
        </div>
        ${col.links.map((l,li)=>`<div class="footer-link-item">
          <div class="footer-link-label">${l.label}</div><div class="footer-link-href">${l.href}</div>
          <button class="icon-btn icon-btn-edit" onclick="editFooterLink(${ci},${li})" style="margin-left:auto"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
          <button class="icon-btn icon-btn-del" onclick="delFooterLink(${ci},${li})"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg></button>
        </div>`).join('')}
      </div>`).join('');
  }

  function addFooterCol(){if(!navData.footer[currentContentLang])navData.footer[currentContentLang]={tagline:'',columns:[]};navData.footer[currentContentLang].columns.push({id:'col-'+Date.now(),title:a('add'),links:[]});renderFooterCols();}
  function delFooterCol(i){if(!confirm(a('deleteColConfirm')))return;navData.footer[currentContentLang].columns.splice(i,1);renderFooterCols();}
  function addFooterLink(ci){const label=prompt(a('linkLabel'));if(!label)return;const href=prompt(a('linkUrl'),'#');if(!href)return;navData.footer[currentContentLang].columns[ci].links.push({label,href});renderFooterCols();}
  function editFooterLink(ci,li){const l=navData.footer[currentContentLang].columns[ci].links[li];const label=prompt(a('linkLabel'),l.label);if(label===null)return;const href=prompt(a('linkUrl'),l.href);if(href===null)return;navData.footer[currentContentLang].columns[ci].links[li]={label,href};renderFooterCols();}
  function delFooterLink(ci,li){navData.footer[currentContentLang].columns[ci].links.splice(li,1);renderFooterCols();}

  async function saveAll(){
    navData.footer[currentContentLang].tagline=document.getElementById('footer-tagline').value;
    if(role==='admin') await pushNav();
    else saveDraftNav();
    const ss=document.getElementById('save-status');
    ss.textContent=role==='admin'?a('publishedMsg'):a('draftSavedMsg');
    ss.classList.add('show');setTimeout(()=>ss.classList.remove('show'),3000);
  }

  async function pushNav(){
    const token=sessionStorage.getItem('sxh-token');
    if(!token){alert(a('tokenMissing'));return;}
    try{
      const gr=await fetch('https://api.github.com/repos/ceycan07-ai/skh-site/contents/data/navigation.json',{headers:{'Authorization':`token ${token}`,'Accept':'application/vnd.github.v3+json'}});
      const gd=await gr.json();
      await fetch('https://api.github.com/repos/ceycan07-ai/skh-site/contents/data/navigation.json',{method:'PUT',headers:{'Authorization':`token ${token}`,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify({message:'cms: navigation update',content:btoa(unescape(encodeURIComponent(JSON.stringify(navData,null,2)))),sha:gd.sha})});
      localStorage.setItem('sxh-last-updated',new Date().toLocaleDateString());
    }catch(e){alert(a('pushError')+e.message);}
  }

  function saveDraftNav(){
    const drafts=JSON.parse(localStorage.getItem('sxh-drafts')||'[]');
    const idx=drafts.findIndex(d=>d.id==='navigation');
    const draft={id:'navigation',name:a('navigation'),type:a('navigation'),date:new Date().toLocaleDateString(),file:'data/navigation.json',content:navData};
    if(idx>=0)drafts[idx]=draft;else drafts.push(draft);
    localStorage.setItem('sxh-drafts',JSON.stringify(drafts));
  }

  applyTranslations();
  loadNav();
</script>
</body>
</html>
