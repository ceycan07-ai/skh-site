<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>SXH Admin — Login</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Segoe UI',system-ui,sans-serif;background:linear-gradient(135deg,#00458f 0%,#0068cc 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;}
    .login-card{background:#fff;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.25);padding:48px 40px;width:100%;max-width:420px;}
    .logo{display:flex;align-items:center;gap:12px;margin-bottom:32px;justify-content:center;}
    .logo img{height:40px;}
    h2{font-size:22px;font-weight:700;color:#00458f;margin-bottom:6px;text-align:center;}
    .subtitle{font-size:13px;color:#8c8c8c;text-align:center;margin-bottom:28px;}
    .form-group{margin-bottom:16px;}
    label{display:block;font-size:12px;font-weight:600;color:#444;margin-bottom:6px;}
    input{width:100%;padding:12px 14px;border:1px solid #dde3ea;border-radius:8px;font-size:14px;font-family:inherit;outline:none;transition:border-color .15s;}
    input:focus{border-color:#00458f;}
    .token-hint{font-size:11px;color:#8c8c8c;margin-top:5px;}
    .btn-login{width:100%;padding:13px;background:#00458f;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:8px;transition:background .15s;}
    .btn-login:hover{background:#003a7a;}
    .error{background:#fef2f2;border:1px solid #fca5a5;color:#dc2626;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:16px;display:none;}
    .error.show{display:block;}
    .footer-note{text-align:center;margin-top:24px;font-size:11px;color:#b0b7c3;}
    .lang-bar{display:flex;justify-content:center;gap:8px;margin-bottom:24px;}
    .al-btn{padding:5px 14px;border-radius:6px;border:1px solid #dde3ea;background:#fff;font-size:12px;font-weight:700;cursor:pointer;color:#666;transition:all .15s;}
    .al-btn.active{background:#00458f;color:#fff;border-color:#00458f;}
  </style>
</head>
<body>
<div class="login-card">
  <div class="logo"><img src="../logo.svg" alt="SunExpress Holidays"/></div>
  <div class="lang-bar" id="lang-bar"></div>
  <h2 id="t-title"></h2>
  <p class="subtitle" id="t-sub"></p>
  <div class="error" id="err"></div>
  <div class="form-group">
    <label id="t-pw"></label>
    <input type="password" id="pw" onkeydown="if(event.key==='Enter') tryLogin()"/>
  </div>
  <div class="form-group">
    <label id="t-token"></label>
    <input type="password" id="gh-token" onkeydown="if(event.key==='Enter') tryLogin()"/>
    <div class="token-hint" id="t-token-hint"></div>
  </div>
  <button class="btn-login" id="t-btn" onclick="tryLogin()"></button>
  <p class="footer-note">SunExpress Holidays © 2026</p>
</div>
<script src="i18n.js"></script>
<script>
  const ADMIN_HASH  = 'b5a1af24a02915ab88921d9549d098f33ee6f611be52bb7239487669ecc450f7';
  const EDITOR_HASH = 'e270aa55f72deb3faf5f75728919add3b4f088a4ada8fafc22fbe5052ba854a6';

  if(sessionStorage.getItem('sxh-role')) location.href='dashboard.html';

  function applyTranslations(){
    document.getElementById('lang-bar').innerHTML = adminLangSwitcher();
    document.getElementById('t-title').textContent = a('loginTitle');
    document.getElementById('t-sub').textContent   = a('loginSubtitle');
    document.getElementById('t-pw').textContent    = a('password');
    document.getElementById('t-token').textContent = a('githubToken');
    document.getElementById('t-token-hint').textContent = a('githubTokenHint');
    document.getElementById('t-btn').textContent   = a('loginBtn');
    document.getElementById('pw').placeholder      = a('passwordPlaceholder');
  }
  applyTranslations();

  async function sha256(str){
    const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }
  async function tryLogin(){
    const pw=document.getElementById('pw').value;
    const token=document.getElementById('gh-token').value.trim();
    const err=document.getElementById('err');
    err.classList.remove('show');
    if(!pw){err.textContent=a('passwordRequired');err.classList.add('show');return;}
    const hash=await sha256(pw);
    if(hash===ADMIN_HASH){
      if(!token){err.textContent=a('tokenRequired');err.classList.add('show');return;}
      sessionStorage.setItem('sxh-role','admin');
      sessionStorage.setItem('sxh-token',token);
      sessionStorage.setItem('sxh-user','Admin');
      location.href='dashboard.html';
    } else if(hash===EDITOR_HASH){
      sessionStorage.setItem('sxh-role','editor');
      sessionStorage.setItem('sxh-user','Editor');
      location.href='dashboard.html';
    } else {
      err.textContent=a('loginError');
      err.classList.add('show');
      document.getElementById('pw').value='';
      document.getElementById('pw').focus();
    }
  }
</script>
</body>
</html>
