<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SunExpress Holidays</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="shared.css"/>
<style>

/* ─────────────────────────────────────────
   DESIGN TOKENS  (matches Figma variables)
───────────────────────────────────────── */
:root {
  --color-primary:        #074588;
  --color-secondary:      #ff6200;
  --color-text-dark:      #262626;
  --color-text-mid:       #616161;
  --color-text-muted:     #828282;
  --color-surface-white:  #ffffff;
  --color-bg:             #f5f7fa;
  --color-border-input:   #828282;
  --color-star:           #f5a623;

  --radius-full:   9999px;
  --radius-btn:    9999px;
  --radius-input:  12px;
  --radius-card:   16px;
  --radius-sm:     12px;

  --shadow-search: 0 8px 24px -4px rgba(0,0,0,.12);
  --shadow-card:   0 4px 16px rgba(0,0,0,.08);
  --shadow-xl:     0 12px 40px rgba(0,0,0,.14);

  --font-primary: 'Noto Sans', sans-serif;
  --sp-page: 240px; /* side padding to 1440px grid */
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-primary); color: var(--color-text-dark); background: var(--color-bg); }

/* ─────────────────────────────────────────
   HERO  (full-width slider, 600px tall)
───────────────────────────────────────── */
.hero {
  position: relative;
  width: 100%;
  height: 600px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* Background image fills the hero */
.hero-bg {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
  transition: opacity .8s ease;
}

/* Subtle bottom-left gradient for text legibility */
.hero-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    135deg,
    rgba(7,69,136,.18) 0%,
    transparent 60%
  );
  pointer-events: none;
}

/* ── Hero headline badges (top-left, glass) ── */
.hero-headlines {
  position: absolute;
  top: 120px;
  left: 32px;
  z-index: 4;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.hero-headline-badge {
  display: inline-block;
  background: rgba(255,255,255,.80);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-radius: var(--radius-sm);
  padding: 12px 16px;
  color: var(--color-text-dark);
  white-space: nowrap;
}
.hero-headline-badge.main {
  font-size: 36px;
  font-weight: 500;
  line-height: 41px;
  letter-spacing: -.3px;
}
.hero-headline-badge.sub {
  font-size: 24px;
  font-weight: 500;
  line-height: 29px;
}

/* ── Offer block (bottom-right, glass) ── */
.hero-offer {
  position: absolute;
  bottom: 148px;   /* sits just above search mask */
  right: 32px;
  z-index: 4;
  background: rgba(255,255,255,.80);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-radius: var(--radius-sm);
  padding: 16px 24px 36px;
  min-width: 239px;
  cursor: pointer;
  text-decoration: none;
}
.hero-offer-dest {
  font-size: 15px;
  font-weight: 400;
  color: var(--color-text-dark);
  line-height: 23px;
}
.hero-offer-name {
  font-size: 20px;
  font-weight: 700;
  color: var(--color-text-dark);
  line-height: 24px;
  margin: 2px 0 4px;
}
.hero-offer-stars {
  display: flex;
  gap: 1px;
  margin-bottom: 6px;
}
.hero-offer-star {
  width: 14px;
  height: 14px;
  color: var(--color-star);
  fill: var(--color-star);
}
.hero-offer-details {
  font-size: 15px;
  color: var(--color-text-dark);
  line-height: 23px;
}
.hero-offer-price-btn {
  position: absolute;
  bottom: -20px;
  right: 16px;
  background: var(--color-primary);
  color: #fff;
  font-size: 15px;
  font-weight: 700;
  line-height: 23px;
  padding: 8px 16px;
  border-radius: var(--radius-btn);
  border: none;
  cursor: pointer;
  white-space: nowrap;
  text-decoration: none;
  display: inline-block;
}

/* ── Slider arrows ── */
.slider-arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  z-index: 5;
  width: 42px;
  height: 42px;
  border-radius: var(--radius-full);
  background: var(--color-surface-white);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 2px 8px rgba(0,0,0,.15);
  transition: background .15s, transform .15s;
  color: var(--color-text-dark);
}
.slider-arrow:hover { background: #f0f0f0; transform: translateY(-50%) scale(1.05); }
.slider-arrow.prev { left: 16px; }
.slider-arrow.next { right: 16px; }
.slider-arrow svg { width: 20px; height: 20px; }

/* ── Slider dots ── */
.slider-dots {
  position: absolute;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 5;
  display: flex;
  gap: 8px;
}
.slider-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: rgba(255,255,255,.45);
  border: none;
  cursor: pointer;
  transition: all .25s;
  padding: 0;
}
.slider-dot.active { background: #fff; width: 24px; border-radius: 4px; }

/* ─────────────────────────────────────────
   SEARCH MASK  (floating card below hero)
───────────────────────────────────────── */
.search-mask-wrap {
  position: relative;
  z-index: 10;
  display: flex;
  justify-content: center;
  margin-top: -73px;   /* overlaps hero bottom – matches Figma */
  padding: 0 32px 40px;
}
.search-mask {
  background: var(--color-surface-white);
  border-radius: var(--radius-card);
  box-shadow: var(--shadow-search);
  width: 100%;
  max-width: 1440px;
  overflow: hidden;
}

/* Tab nav */
.search-tabs {
  display: flex;
  gap: 16px;
  padding: 0 16px;
  border-bottom: 1px solid #e8e8e8;
}
.search-tab {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 8px 11px;
  font-size: 15px;
  font-weight: 700;
  color: var(--color-text-muted);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  transition: color .15s;
  text-decoration: none;
  white-space: nowrap;
}
.search-tab.active {
  color: var(--color-text-dark);
  border-bottom-color: var(--color-primary);
}
.search-tab svg { width: 20px; height: 20px; flex-shrink: 0; }

/* Inputs row */
.search-inputs {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 16px;
}
.search-input {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 11px;
  border: 1px solid var(--color-border-input);
  border-radius: var(--radius-input);
  padding: 5px 16px;
  background: var(--color-surface-white);
  cursor: pointer;
  transition: border-color .15s, box-shadow .15s;
  min-width: 0;
}
.search-input:hover { border-color: var(--color-primary); box-shadow: 0 0 0 2px rgba(7,69,136,.08); }
.search-input svg { width: 20px; height: 20px; flex-shrink: 0; color: var(--color-text-mid); }
.search-input-text { display: flex; flex-direction: column; min-width: 0; flex: 1; }
.search-input-label {
  font-size: 13px;
  color: var(--color-text-mid);
  line-height: 20px;
  font-weight: 400;
}
.search-input-value {
  font-size: 15px;
  color: var(--color-text-dark);
  line-height: 23px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.search-btn {
  background: var(--color-secondary);
  color: #fff;
  font-size: 18px;
  font-weight: 700;
  line-height: 25px;
  padding: 12px 24px;
  height: 50px;
  border-radius: var(--radius-btn);
  border: none;
  cursor: pointer;
  min-width: 140px;
  flex-shrink: 0;
  transition: background .15s, transform .1s;
}
.search-btn:hover { background: #e85500; transform: scale(1.02); }

/* ─────────────────────────────────────────
   USP BAR
───────────────────────────────────────── */
.usp-bar {
  display: flex;
  justify-content: center;
  gap: 32px;
  padding: 14px 32px;
  background: var(--color-surface-white);
  border-bottom: 1px solid #e8e8e8;
}
.usp-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  font-weight: 600;
  color: var(--color-text-dark);
}
.usp-item svg { color: var(--color-primary); }

/* ─────────────────────────────────────────
   PAGE SECTIONS  (max 1440px centred)
───────────────────────────────────────── */
.page-section {
  padding: 48px 32px;
  max-width: calc(1440px + 64px);
  margin: 0 auto;
}
.section-header {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-bottom: 28px;
}
.section-title {
  font-size: 28px;
  font-weight: 700;
  color: var(--color-text-dark);
  line-height: 1.2;
}
.section-sub {
  font-size: 15px;
  color: var(--color-text-muted);
  margin-top: 4px;
  line-height: 23px;
}
.link-more {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 15px;
  font-weight: 700;
  color: var(--color-primary);
  text-decoration: none;
  white-space: nowrap;
}
.link-more:hover { text-decoration: underline; }
.link-more svg { width: 16px; height: 16px; }

/* ─────────────────────────────────────────
   TEASER SLIDER  (promo cards)
───────────────────────────────────────── */
.bg-white { background: var(--color-surface-white); }
.bg-grey  { background: #f5f7fa; }

.teaser-slider { overflow: hidden; border-radius: var(--radius-card); }
.teaser-track {
  display: flex;
  transition: transform .45s cubic-bezier(.4,0,.2,1);
}
.teaser-slide {
  flex: 0 0 100%;
  display: flex;
  align-items: center;
  gap: 32px;
  padding: 36px 48px;
  border-radius: var(--radius-card);
  min-height: 200px;
  position: relative;
  overflow: hidden;
}
.tsr-orange { background: linear-gradient(135deg, #ff6200 0%, #ff8c42 100%); }
.tsr-blue   { background: linear-gradient(135deg, #074588 0%, #1565c0 100%); }
.tsr-teal   { background: linear-gradient(135deg, #006d6d 0%, #00979a 100%); }

.tsr-art { flex-shrink: 0; width: 160px; height: 140px; }
.tsr-art svg { width: 100%; height: 100%; }

.tsr-body { flex: 1; color: #fff; }
.tsr-eyebrow { font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; opacity: .85; margin-bottom: 8px; }
.tsr-title { font-size: 28px; font-weight: 700; line-height: 1.2; margin-bottom: 10px; }
.tsr-title em { font-style: normal; opacity: .9; }
.tsr-sub { font-size: 15px; line-height: 1.6; opacity: .88; margin-bottom: 20px; max-width: 480px; }
.tsr-actions { display: flex; gap: 12px; }
.tsr-cta {
  background: rgba(255,255,255,.2);
  border: 2px solid rgba(255,255,255,.6);
  color: #fff;
  font-size: 15px;
  font-weight: 700;
  padding: 10px 24px;
  border-radius: var(--radius-btn);
  text-decoration: none;
  transition: background .15s;
}
.tsr-cta:hover { background: rgba(255,255,255,.32); }

.tsr-right { margin-left: auto; display: flex; flex-direction: column; align-items: flex-end; gap: 16px; flex-shrink: 0; }
.tsr-stamp {
  background: rgba(255,255,255,.2);
  border: 2px solid rgba(255,255,255,.5);
  border-radius: 12px;
  padding: 12px 20px;
  text-align: center;
  color: #fff;
}
.tsr-stamp-num { font-size: 28px; font-weight: 700; line-height: 1; }
.tsr-stamp-lbl { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; opacity: .8; margin-top: 4px; }

.tsr-countdown { display: flex; gap: 8px; }
.tsr-unit { text-align: center; background: rgba(255,255,255,.15); border-radius: 8px; padding: 8px 10px; color: #fff; }
.tsr-unit-num { font-size: 22px; font-weight: 700; line-height: 1; }
.tsr-unit-lbl { font-size: 10px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; opacity: .75; margin-top: 2px; }

.tsr-dots { display: flex; justify-content: center; gap: 8px; margin-top: 14px; }
.tsr-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: #ccc; border: none; cursor: pointer; transition: all .25s; padding: 0;
}
.tsr-dot.active { background: var(--color-primary); width: 24px; border-radius: 4px; }

.tsr-arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  z-index: 3;
  width: 40px; height: 40px;
  border-radius: 50%;
  background: rgba(255,255,255,.9);
  border: none;
  font-size: 20px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 8px rgba(0,0,0,.15);
  transition: background .15s;
  color: var(--color-text-dark);
}
.tsr-arrow:hover { background: #fff; }
.tsr-arrow-prev { left: 12px; }
.tsr-arrow-next { right: 12px; }

/* ─────────────────────────────────────────
   DESTINATION GRID  (4 cols)
───────────────────────────────────────── */
.dest-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
}
.dest-card {
  border-radius: var(--radius-card);
  overflow: hidden;
  box-shadow: var(--shadow-card);
  background: var(--color-surface-white);
  cursor: pointer;
  transition: box-shadow .2s, transform .2s;
  display: block;
  text-decoration: none;
}
.dest-card:hover { box-shadow: var(--shadow-xl); transform: translateY(-3px); }

.dest-img {
  height: 160px;
  position: relative;
  background-size: cover;
  background-position: center;
}
.dest-img-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(7,69,136,.75) 0%, transparent 55%);
}
.dest-img-content { position: absolute; bottom: 12px; left: 12px; z-index: 1; }
.dest-name { font-size: 17px; font-weight: 700; color: #fff; }
.dest-country { font-size: 11px; color: rgba(255,255,255,.75); font-weight: 600; }

.dest-footer {
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.dest-price { font-size: 19px; font-weight: 700; color: var(--color-secondary); }
.dest-price span { font-size: 11px; font-weight: 400; color: var(--color-text-muted); }

/* ─────────────────────────────────────────
   OFFER GRID  (3 cols – freshMS Simple Hotel Teaser)
───────────────────────────────────────── */
.offer-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}
.offer-card {
  background: var(--color-surface-white);
  border-radius: var(--radius-card);
  box-shadow: var(--shadow-card);
  overflow: hidden;
  transition: box-shadow .2s, transform .15s;
}
.offer-card:hover { box-shadow: var(--shadow-xl); transform: translateY(-2px); }

.offer-img {
  height: 180px;
  position: relative;
  background-size: cover;
  background-position: center;
  display: flex;
  align-items: flex-end;
  padding: 12px 16px;
}
.offer-img-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,.5) 0%, transparent 60%);
}
.offer-img-name { position: relative; z-index: 1; font-size: 14px; font-weight: 700; color: #fff; }

.offer-body { padding: 16px 16px 12px; }
.offer-hotel { font-size: 17px; font-weight: 700; color: var(--color-text-dark); margin-bottom: 4px; }
.offer-dest  { font-size: 13px; color: var(--color-text-muted); margin-bottom: 8px; display: flex; align-items: center; gap: 4px; }
.offer-stars { display: flex; align-items: center; gap: 6px; font-size: 13px; }
.offer-score { color: var(--color-text-muted); }
.offer-tags  { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }

.offer-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  background: #f9fafb;
  border-top: 1px solid #f0f0f0;
}
.offer-price-val { font-size: 26px; font-weight: 700; color: var(--color-secondary); line-height: 1; }
.offer-price-pp  { font-size: 11px; color: var(--color-text-muted); margin-top: 2px; }

/* ─────────────────────────────────────────
   PROMO CARD  (full-width banner)
───────────────────────────────────────── */
.promo-card {
  background: linear-gradient(135deg, var(--color-primary) 0%, #1565c0 100%);
  border-radius: var(--radius-card);
  padding: 40px 48px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 32px;
  color: #fff;
}
.promo-badge {
  display: inline-block;
  background: var(--color-secondary);
  color: #fff;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 4px 12px;
  border-radius: var(--radius-btn);
  margin-bottom: 12px;
}
.promo-card h3 { font-size: 26px; font-weight: 700; line-height: 1.2; margin-bottom: 8px; }
.promo-card p  { font-size: 15px; opacity: .88; line-height: 1.6; max-width: 560px; }
.btn-white {
  background: #fff;
  color: var(--color-primary);
  font-size: 15px;
  font-weight: 700;
  padding: 14px 28px;
  border-radius: var(--radius-btn);
  text-decoration: none;
  white-space: nowrap;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: background .15s;
}
.btn-white:hover { background: #f0f4ff; }

/* ─────────────────────────────────────────
   WHY GRID  (4 cols – Quality Teaser)
───────────────────────────────────────── */
.why-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
  margin-top: 32px;
}
.why-card {
  background: var(--color-surface-white);
  border-radius: var(--radius-card);
  padding: 28px 20px;
  text-align: center;
  box-shadow: var(--shadow-card);
}
.why-icon {
  width: 56px; height: 56px;
  border-radius: 50%;
  background: #eef3fb;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 14px;
  color: var(--color-primary);
}
.why-card h4 { font-size: 15px; font-weight: 700; color: var(--color-text-dark); margin-bottom: 6px; }
.why-card p  { font-size: 13px; color: var(--color-text-muted); line-height: 1.5; }

/* ─────────────────────────────────────────
   BADGES / TAGS  (shared)
───────────────────────────────────────── */
.badge {
  display: inline-flex;
  align-items: center;
  padding: 3px 10px;
  border-radius: var(--radius-btn);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .3px;
}
.badge-orange { background: rgba(255,98,0,.12); color: var(--color-secondary); }
.badge-blue   { background: rgba(7,69,136,.10); color: var(--color-primary); }
.badge-yellow { background: rgba(245,166,35,.15); color: #b07800; }
.tag {
  padding: 3px 10px;
  background: #eef3fb;
  color: var(--color-primary);
  border-radius: var(--radius-btn);
  font-size: 11px;
  font-weight: 600;
}

/* BTN */
.btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; border-radius: var(--radius-btn); font-size: 14px; font-weight: 700; text-decoration: none; border: none; cursor: pointer; transition: background .15s, transform .1s; }
.btn-primary { background: var(--color-primary); color: #fff; }
.btn-primary:hover { background: #0a3d77; transform: scale(1.02); }
.btn-sm { padding: 8px 16px; font-size: 13px; }

/* STARS inline orange */
.stars { display: flex; align-items: center; gap: 4px; }
.stars-val { color: var(--color-star); font-size: 13px; }
.score { font-size: 12px; color: var(--color-text-muted); }

</style>
</head>
<body>

<!-- ── SITE HEADER (injected by components.js) ── -->
<div id="site-header" data-page="home"></div>

<!-- ══════════════════════════════════════════
     HERO SLIDER
══════════════════════════════════════════ -->
<section class="hero" id="hero">
  <div class="hero-bg" id="hero-bg"></div>
  <div class="hero-overlay"></div>

  <!-- Headline badges top-left -->
  <div class="hero-headlines">
    <span class="hero-headline-badge main" id="hero-title"></span>
    <span class="hero-headline-badge sub" id="hero-sub"></span>
  </div>

  <!-- Offer block bottom-right -->
  <a href="hotel.html" class="hero-offer" id="hero-offer-card">
    <div class="hero-offer-dest">Antalya</div>
    <div class="hero-offer-name">Sealife Family Resort Hotel</div>
    <div class="hero-offer-stars">
      <svg class="hero-offer-star" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      <svg class="hero-offer-star" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      <svg class="hero-offer-star" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>

function tsStartCountdown() {
  const el = document.getElementById('ts-cd');
  if (!el) return;
  const deadline = new Date('2026-05-26T23:59:59');
  const tick = () => {
    const diff = deadline - new Date();
    if (diff <= 0) { el.innerHTML = ''; return; }
    const d = Math.floor(diff / 86400000);
    const h = Math.floor((diff % 86400000) / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);
    const lbl = currentLang==='tr' ? ['Gün','Sa','Dk','Sn'] :
                currentLang==='en' ? ['Days','Hrs','Min','Sec'] : ['Tage','Std','Min','Sek'];
    el.innerHTML = [d,h,m,s].map((v,i) =>
      `<div class="tsr-unit"><div class="tsr-unit-num">${String(v).padStart(2,'0')}</div><div class="tsr-unit-lbl">${lbl[i]}</div></div>`
    ).join('');
  };
  tick(); setInterval(tick, 1000);
}

function tsGo(i) {
  tsIdx = i;
  document.getElementById('tsTrack').style.transform = `translateX(-${i*100}%)`;
  document.querySelectorAll('.tsr-dot').forEach((d,j) => d.classList.toggle('active', j===i));

          <div style="font-size:10px;color:var(--color-text-muted);text-transform:uppercase">Ab</div>
          <div class="offer-price-val">€ ${o.price}</div>
          <div class="offer-price-pp">p.P., 7 ${t('search','nights')}</div>
        </div>
        <a href="hotel.html" class="btn btn-primary btn-sm">${sp.bookNow||'Buchen'}</a>
      </div>
    </div>`).join('');

  /* Promo banner */
  document.getElementById('promo-label').textContent = ho.promoLabel || '';
  document.getElementById('promo-title').textContent = ho.promoTitle || '';
  document.getElementById('promo-text').textContent  = ho.promoText  || '';
  document.getElementById('promo-btn').innerHTML     = (ho.promoBtn||'') + ' ' + arrowSvg();

  /* Why section */
  document.getElementById('why-title').textContent = ho.whyTitle || '';
  document.getElementById('why-sub').textContent   = ho.whySub   || '';
  const why = ho.why||[], whyD = ho.whyDesc||[];
  document.getElementById('why-grid').innerHTML = why.map((w,i) =>
    `<div class="why-card"><div class="why-icon">${WHY_ICONS[i]||''}</div><h4>${w}</h4><p>${whyD[i]||''}</p></div>`
  ).join('');

  /* Boot */
  buildSlider();
  buildTeaserSlides();

  /* Lazy images */
  DESTS.forEach(d  => fetchUnsplashImg(d.q, d.id));
  OFFERS.forEach(o => fetchUnsplashImg(o.q, o.id));
});
</script>
</body>
</html>
