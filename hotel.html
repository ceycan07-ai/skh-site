<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>SunExpress Holidays — Hotel</title>
  <link rel="stylesheet" href="shared.css"/>
  <style>
    .hotel-hero{height:440px;position:relative;background:linear-gradient(160deg,var(--blue-dark),var(--blue-mid));background-size:cover;background-position:center;}
    .hotel-hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(4,48,109,.85) 0%,transparent 55%);}
    .hotel-hero-content{position:absolute;bottom:0;left:0;right:0;padding:32px var(--sp-xl);}
    .hotel-hero-content h1{font-size:36px;font-weight:700;color:#fff;margin-bottom:8px;}
    .hotel-meta{display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
    .hotel-meta span{font-size:13px;color:rgba(255,255,255,.85);display:flex;align-items:center;gap:5px;}
    .hotel-layout{display:grid;grid-template-columns:1fr 340px;gap:var(--sp-xl);padding:var(--sp-xl);max-width:1340px;margin:0 auto;}
    .gallery-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:24px;}
    .gallery-img{height:120px;border-radius:var(--r-md);background-size:cover;background-position:center;cursor:pointer;transition:opacity .2s;}
    .gallery-img:hover{opacity:.85;}
    .hotel-tabs{display:flex;gap:0;border-bottom:2px solid var(--grey-1);margin-bottom:24px;}
    .hotel-tab{font-family:var(--font);font-size:13px;font-weight:600;padding:10px 20px;border:none;background:none;color:var(--grey-3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;}
    .hotel-tab.active{color:var(--blue);border-bottom-color:var(--blue);}
    .hotel-tab:hover{color:var(--blue);}
    .tab-content{display:none;} .tab-content.active{display:block;}
    .amenities-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:16px;}
    .amenity-item{display:flex;align-items:center;gap:10px;padding:12px;background:var(--greyblue-2);border-radius:var(--r-md);}
    .amenity-item svg{color:var(--blue);flex-shrink:0;}
    .amenity-item span{font-size:13px;font-weight:600;color:var(--blue-dark);}
    .review-summary{display:flex;align-items:center;gap:32px;padding:20px;background:var(--greyblue-2);border-radius:var(--r-lg);margin-bottom:20px;}
    .review-score .big{font-size:48px;font-weight:700;color:var(--blue);line-height:1;}
    .review-bars{flex:1;}
    .review-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
    .review-bar-label{font-size:12px;color:var(--text);min-width:100px;}
    .review-bar-track{flex:1;height:6px;background:var(--grey-2);border-radius:var(--r-full);overflow:hidden;}
    .review-bar-fill{height:100%;background:var(--blue);border-radius:var(--r-full);}
    .review-bar-val{font-size:12px;font-weight:600;min-width:28px;text-align:right;}
    .review-card{padding:16px;border:1px solid var(--grey-1);border-radius:var(--r-lg);margin-bottom:12px;}
    .reviewer{font-size:13px;font-weight:700;color:var(--text);}
    .review-date{font-size:11px;color:var(--grey-3);}
    .booking-card{background:#fff;border-radius:var(--r-xl);box-shadow:var(--sh-xl);border:1px solid var(--grey-1);overflow:hidden;position:sticky;top:88px;}
    .booking-card-head{padding:20px;background:var(--blue);color:#fff;}
    .bc-price{font-size:36px;font-weight:700;}
    .bc-price-pp{font-size:13px;opacity:.8;}
    .booking-card-body{padding:20px;}
    .bc-row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:10px;}
    .bc-row span:first-child{color:var(--grey-3);}
    .bc-row span:last-child{font-weight:600;}
    .bc-divider{border:none;border-top:1px solid var(--grey-1);margin:12px 0;}
    .bc-total{display:flex;justify-content:space-between;font-size:16px;font-weight:700;}
    .bc-total .amount{color:var(--orange);}
    .bc-avail{display:flex;align-items:center;gap:6px;font-size:12px;color:#d3550a;font-weight:600;margin-bottom:14px;}
    .bc-book-btn{width:100%;justify-content:center;font-size:15px;font-weight:700;padding:14px;}
    .bc-note{font-size:11px;color:var(--grey-3);text-align:center;margin-top:10px;line-height:1.5;}
    .bc-features{margin-top:16px;display:flex;flex-direction:column;gap:8px;}
    .bc-feat{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text);}
    .bc-feat svg{color:var(--blue);flex-shrink:0;}
    .room-card{border:1px solid var(--grey-1);border-radius:var(--r-lg);overflow:hidden;margin-bottom:16px;}
    .room-img{height:160px;background-size:cover;background-position:center;}
    .room-body{padding:16px;}
    .room-name{font-size:15px;font-weight:700;color:var(--blue);margin-bottom:6px;}
    .room-meta{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px;}
    .room-meta-item{font-size:12px;color:var(--grey-3);display:flex;align-items:center;gap:4px;}
    .room-price-row{display:flex;align-items:center;justify-content:space-between;}
    .room-price{font-size:22px;font-weight:700;color:var(--orange);}
    .room-price-pp{font-size:11px;color:var(--grey-3);}
  </style>
</head>
<body>
  <div id="site-header" data-page="search"></div>
  <div class="breadcrumb">
    <a href="index.html" id="bc-home"></a><span class="breadcrumb-sep">/</span>
    <a href="search.html" id="bc-search"></a><span class="breadcrumb-sep">/</span>
    <span>Rixos Premium Belek</span>
  </div>
  <div class="hotel-hero" id="hotel-hero">
    <div class="hotel-hero-overlay"></div>
    <div class="hotel-hero-content">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <span class="badge badge-orange" id="h-badge1"></span>
        <span class="badge badge-blue" id="h-badge2"></span>
      </div>
      <h1>Rixos Premium Belek</h1>
      <div class="hotel-meta">
        <span><span style="color:var(--orange-light);font-size:16px">★★★★★</span> <span id="h-stars-label"></span></span>
        <span><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>Belek, Antalya</span>
        <span><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>4.8/5 (2.841)</span>
      </div>
    </div>
  </div>

  <div class="hotel-layout">
    <div>
      <div class="gallery-grid">
        <div class="gallery-img ci1" id="gimg1"></div>
        <div class="gallery-img ci3" id="gimg2"></div>
        <div class="gallery-img ci4" id="gimg3"></div>
        <div class="gallery-img ci5" id="gimg4"></div>
        <div class="gallery-img ci7" id="gimg5"></div>
        <div class="gallery-img ci2" id="gimg6"></div>
      </div>
      <div class="hotel-tabs" id="hotel-tabs"></div>
      <div class="tab-content active" id="tab-overview">
        <h3 style="font-size:18px;font-weight:700;color:var(--blue);margin-bottom:12px" id="tab-about-title"></h3>
        <p style="font-size:14px;line-height:1.7;color:var(--text);margin-bottom:16px" id="tab-desc1"></p>
        <p style="font-size:14px;line-height:1.7;color:var(--text)" id="tab-desc2"></p>
        <div class="amenities-grid" id="amenities-overview"></div>
      </div>
      <div class="tab-content" id="tab-rooms">
        <h3 style="font-size:18px;font-weight:700;color:var(--blue);margin-bottom:16px" id="rooms-title"></h3>
        <div id="rooms-list"></div>
      </div>
      <div class="tab-content" id="tab-facilities">
        <h3 style="font-size:18px;font-weight:700;color:var(--blue);margin-bottom:16px" id="fac-title"></h3>
        <div class="amenities-grid" id="amenities-fac"></div>
      </div>
      <div class="tab-content" id="tab-reviews">
        <div class="review-summary">
          <div class="review-score"><div class="big">4.8</div><div style="color:var(--orange-light);font-size:20px">★★★★★</div><div style="font-size:12px;color:var(--grey-3)">2.841</div></div>
          <div class="review-bars" id="review-bars"></div>
        </div>
        <div id="review-cards"></div>
      </div>
      <div class="tab-content" id="tab-location">
        <h3 style="font-size:18px;font-weight:700;color:var(--blue);margin-bottom:12px" id="loc-title"></h3>
        <div style="background:var(--greyblue-2);border-radius:var(--r-lg);padding:20px;margin-bottom:16px" id="loc-facts"></div>
        <div style="height:280px;background:linear-gradient(135deg,#e5f2fc,#aecae2);border-radius:var(--r-lg);display:flex;align-items:center;justify-content:center;color:var(--blue);font-size:14px;font-weight:600">🗺️ Belek, Antalya</div>
      </div>
    </div>

    <div>
      <div class="booking-card">
        <div class="booking-card-head">
          <div id="bc-from" style="font-size:12px;opacity:.8"></div>
          <div class="bc-price">€ 1.249</div>
          <div class="bc-price-pp" id="bc-pp"></div>
        </div>
        <div class="booking-card-body" id="bc-body">
        </div>
      </div>
    </div>
  </div>

  <div id="site-footer"></div>
  <script src="components.js"></script>
  <script>
  function ck(){ return `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>`; }
  function asvg(w,p){ return `<svg width="${w||18}" height="${w||18}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${p}</svg>`; }

  function showTab(id,btn){
    document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.hotel-tab').forEach(t=>t.classList.remove('active'));
    document.getElementById('tab-'+id).classList.add('active');
    btn.classList.add('active');
  }

  document.addEventListener('DOMContentLoaded',()=>{
    const h=tObj('hotel'); const bd=tObj('badges');

    // Hero
    document.getElementById('h-badge1').textContent=bd.beliebt||'Beliebt';
    document.getElementById('h-badge2').textContent=(tObj('sp').vp||{})['all-inclusive']||'All-Inclusive';
    document.getElementById('h-stars-label').textContent='5-'+h.overview||'';
    document.getElementById('bc-home').textContent=t('nav','home');
    document.getElementById('bc-search').textContent=tObj('sp').resultCount?.replace('{{n}}','')||t('nav','offers');

    // Tabs
    const tabs=[
      {id:'overview',label:h.overview},{id:'rooms',label:h.rooms},{id:'facilities',label:h.facilities},
      {id:'reviews',label:h.reviews},{id:'location',label:h.location}
    ];
    document.getElementById('hotel-tabs').innerHTML=tabs.map((tab,i)=>
      `<button class="hotel-tab ${i===0?'active':''}" onclick="showTab('${tab.id}',this)">${tab.label}</button>`
    ).join('');

    // Overview tab
    document.getElementById('tab-about-title').textContent=h.aboutHotel||'';
    const desc1={de:'Das Rixos Premium Belek ist ein luxuriöses 5-Sterne-Resort an der türkischen Riviera, direkt am Sandstrand gelegen. Mit einem umfangreichen All-Inclusive-Konzept, mehreren Pools und einem erstklassigen Spa bietet das Hotel alles, was das Herz begehrt.',en:'The Rixos Premium Belek is a luxurious 5-star resort on the Turkish Riviera, located directly on the sandy beach. With a comprehensive all-inclusive concept, multiple pools and a first-class spa, the hotel offers everything the heart desires.',tr:'Rixos Premium Belek, Türk Rivierası\'nda yer alan, doğrudan kumsal kenarında konumlanan lüks bir 5 yıldızlı tatil köyüdür. Kapsamlı her şey dahil konsepti, birden fazla havuzu ve birinci sınıf spası ile otel her şeyi sunar.'};
    const desc2={de:'Das Hotel verfügt über 517 Zimmer und Suiten, 9 Pools, 11 Restaurants und Bars sowie einen exklusiven Privatstrand.',en:'The hotel has 517 rooms and suites, 9 pools, 11 restaurants and bars and an exclusive private beach.',tr:'Otel 517 oda ve süit, 9 havuz, 11 restoran ve bar ile özel plaja sahiptir.'};
    document.getElementById('tab-desc1').textContent=desc1[currentLang]||desc1.de;
    document.getElementById('tab-desc2').textContent=desc2[currentLang]||desc2.de;

    const amenItems=[
      {icon:`<path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 002 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/>`,label:h.privateBeach},
      {icon:`<rect x="3" y="3" width="18" height="18" rx="2"/>`,label:`9 ${h.pools}`},
      {icon:`<path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/>`,label:h.spa},
      {icon:`<circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/>`,label:h.kidsClub},
      {icon:`<path d="M3 18v-6a9 9 0 0118 0v6"/>`,label:`11 ${h.restaurants}`},
      {icon:`<polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>`,label:h.gym},
    ];
    const ameHTML=amenItems.map(a=>`<div class="amenity-item">${asvg(18,a.icon)}<span>${a.label}</span></div>`).join('');
    document.getElementById('amenities-overview').innerHTML=ameHTML;
    document.getElementById('amenities-fac').innerHTML=ameHTML+`
      <div class="amenity-item">${asvg(18,'<rect x="1" y="6" width="22" height="14" rx="2"/><path d="M1 10h22"/>')}<span>${h.wifi}</span></div>
      <div class="amenity-item">${asvg(18,'<rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/>')}<span>${h.shuttle}</span></div>
      <div class="amenity-item">${asvg(18,'<path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>')}<span>${h.concierge}</span></div>`;

    // Rooms tab
    document.getElementById('rooms-title').textContent=h.rooms||'';
    document.getElementById('rooms-list').innerHTML=`
      <div class="room-card"><div class="room-img ci1" id="rimg1"></div><div class="room-body">
        <div class="room-name">Deluxe ${h.room} – ${currentLang==='tr'?'Deniz Manzarası':currentLang==='en'?'Sea View':'Meerblick'}</div>
        <div class="room-meta"><span class="room-meta-item">2 ${h.adults||'Pers.'}</span><span class="room-meta-item">45 m²</span></div>
        <div class="room-price-row"><div><div class="room-price">€ 1.249</div><div class="room-price-pp">${h.perPerson}, 7 ${h.nights}</div></div><a href="booking.html" class="btn btn-primary">${h.selectRoom}</a></div>
      </div></div>
      <div class="room-card"><div class="room-img ci3" id="rimg2"></div><div class="room-body">
        <div class="room-name">Junior Suite</div>
        <div class="room-meta"><span class="room-meta-item">2–4 ${h.adults||'Pers.'}</span><span class="room-meta-item">75 m²</span></div>
        <div class="room-price-row"><div><div class="room-price">€ 1.649</div><div class="room-price-pp">${h.perPerson}, 7 ${h.nights}</div></div><a href="booking.html" class="btn btn-primary">${h.selectRoom}</a></div>
      </div></div>`;
    fetchUnsplashImg('luxury hotel room sea view',`rimg1`);
    fetchUnsplashImg('junior suite hotel resort',`rimg2`);

    // Reviews tab
    document.getElementById('fac-title').textContent=h.facilities||'';
    const bars=[{k:h.location_label,v:96},{k:h.room||'Zimmer',v:94},{k:h.service,v:98},{k:h.cleanliness,v:96},{k:h.food,v:90}];
    document.getElementById('review-bars').innerHTML=bars.map(b=>`<div class="review-bar-row"><span class="review-bar-label">${b.k}</span><div class="review-bar-track"><div class="review-bar-fill" style="width:${b.v}%"></div></div><span class="review-bar-val">${(b.v/20).toFixed(1)}</span></div>`).join('');
    const rvs={de:[{name:'Familie Schmidt, München',date:'März 2026',text:'Absolut traumhafter Urlaub! Das Personal war unglaublich freundlich.'},{name:'Peter M., Wien',date:'April 2026',text:'Das beste Hotel, in dem ich je war. All-Inclusive auf höchstem Niveau.'}],en:[{name:'Smith Family, London',date:'March 2026',text:'Absolutely amazing holiday! The staff were incredibly friendly.'},{name:'Peter M., Vienna',date:'April 2026',text:'The best hotel I have ever stayed in. All-Inclusive at the highest level.'}],tr:[{name:'Schmidt Ailesi, Münih',date:'Mart 2026',text:'Kesinlikle harika bir tatil! Personel inanılmaz derecede güler yüzlüydü.'},{name:'Peter M., Viyana',date:'Nisan 2026',text:'Şimdiye kadar kaldığım en iyi otel. Her şey dahil en üst seviyede.'}]};
    const rv=rvs[currentLang]||rvs.de;
    document.getElementById('review-cards').innerHTML=rv.map(r=>`<div class="review-card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span class="reviewer">${r.name}</span><span class="review-date">${r.date}</span></div><div style="color:var(--orange-light);font-size:14px;margin-bottom:8px">★★★★★</div><p style="font-size:13px;color:var(--text);line-height:1.6">${r.text}</p></div>`).join('');

    // Location tab
    document.getElementById('loc-title').textContent=h.location||'';
    const locData=[{k:h.airport,v:'35 km · ~40 min'},{k:h.cityCenter,v:'3 km · ~5 min'},{k:h.nearestBeach,v:h.directlyAtHotel}];
    document.getElementById('loc-facts').innerHTML=`<div style="display:flex;gap:24px;flex-wrap:wrap">${locData.map(l=>`<div><div style="font-size:12px;color:var(--grey-3);font-weight:600">${l.k}</div><div style="font-size:14px;font-weight:700;color:var(--blue)">${l.v}</div></div>`).join('')}</div>`;

    // Booking card
    document.getElementById('bc-from').textContent=h.from||'Ab';
    document.getElementById('bc-pp').textContent=`${h.perPerson} · 7 ${h.nights}`;
    document.getElementById('bc-body').innerHTML=`
      <div class="bc-row"><span>${h.travelPeriod}</span><span>15.–22. ${currentLang==='tr'?'Tem':currentLang==='en'?'Jul':'Jul'} 2026</span></div>
      <div class="bc-row"><span>${h.travelers}</span><span>2 ${h.adults}, 1 ${h.child}</span></div>
      <div class="bc-row"><span>${h.board}</span><span>${(tObj('sp').vp||{})['all-inclusive']||'All-Inclusive'}</span></div>
      <div class="bc-row"><span>${h.room}</span><span>Deluxe ${currentLang==='tr'?'Deniz':currentLang==='en'?'Sea View':'Meerblick'}</span></div>
      <div class="bc-row"><span>${h.flight}</span><span>FRA → AYT</span></div>
      <div class="bc-row"><span>${h.transfer}</span><span>${h.included}</span></div>
      <hr class="bc-divider"/>
      <div class="bc-total"><span>${h.totalPrice}</span><span class="amount">€ 3.747</span></div>
      <div style="font-size:11px;color:var(--grey-3);margin-top:4px">2 ${h.adults} + 1 ${h.child}</div>
      <div class="bc-avail" style="margin-top:12px">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        ${(h.roomsLeft||'').replace('{{n}}','3')}
      </div>
      <a href="booking.html" class="btn btn-primary bc-book-btn">${h.bookNow}</a>
      <p class="bc-note">${h.noFee} · ${h.freeCancel}</p>
      <div class="bc-features">
        <div class="bc-feat">${ck()} ${h.bestPrice}</div>
        <div class="bc-feat">${ck()} ${h.atol}</div>
        <div class="bc-feat">${ck()} ${h.support}</div>
      </div>`;

    // Images
    fetchUnsplashImg('rixos belek resort pool luxury','hotel-hero');
    fetchUnsplashImg('resort pool antalya turkey','gimg1');
    fetchUnsplashImg('luxury hotel room sea view','gimg2');
    fetchUnsplashImg('hotel private beach sand','gimg3');
    fetchUnsplashImg('hotel spa wellness indoor pool','gimg4');
    fetchUnsplashImg('hotel restaurant fine dining','gimg5');
    fetchUnsplashImg('resort kids pool waterpark','gimg6');
  });
  </script>
</body>
</html>
